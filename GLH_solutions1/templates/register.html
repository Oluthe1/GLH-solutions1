<head>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/7.1.0/mdb.min.css" rel="stylesheet" />
    <script src='https://kit.fontawesome.com/a076d05399.js' crossorigin='anonymous'></script>
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet" />
    <link href="../static/content/regist.css" rel="stylesheet" />
</head>
<body>
    <form action="/register" method="post">
        <section class="h-100 h-custom gradient-custom-2">
            <div class="container py-5 h-100">
                <div class="row d-flex justify-content-center align-items-center h-100">
                    <div class="col-12">
                        <div class="card card-registration card-registration-2" style="border-radius: 15px;">
                            <div class="card-body p-0">
                                <div class="row g-0">
                                    <div class="col-lg-6">
                                        <div class="p-5">
                                            <h3 class="fw-normal mb-5" style="color: #4835d4;">General Infomation</h3>



                                            <div class="row">
                                                <div class="col-md-6 mb-4 pb-2">

                                                    <div data-mdb-input-init class="form-outline">
                                                        <input type="text" id="form3Examplev2" name="firstname" placeholder="First Name" style="border: hidden" />

                                                    </div>

                                                </div>
                                                <div class="col-md-6 mb-4 pb-2">

                                                    <div data-mdb-input-init class="form-outline">
                                                        <input type="text" id="form3Examplev3" name="lastname" placeholder="Last Name" style="border: hidden" />
                                                    </div>

                                                </div>
                                            </div>



                                            <div class="mb-4 pb-2">
                                                <div data-mdb-input-init class="form-outline">
                                                    <input type="text" id="form3Examplev4" name="username" placeholder="Username" style="border: hidden"/>
                                                </div>
                                            </div>

                                            <div class="row">
                                                <div class="col-md-6 mb-4 pb-2 mb-md-0 pb-md-0">

                                                    <div data-mdb-input-init class="form-outline">
                                                        <label>Birthday</label>
                                                        <br/>
                                                        <input type="date" id="form3Examplev5" placeholder="Birthday" name="birthday"/>
                                                    </div>

                                                </div>
                                                <div class="col-md-6">

                                                </div>
                                            </div>
                                            <br />
                                            <div class="mb-4 pb-2">
                                                <div data-mdb-input-init class="form-outline">
                                                    <input type="email" id="form3Examplev4" name="email" placeholder="Email" style="border: hidden" />
                                            
                                                </div>
                                            </div>

                                            <div class="mb-4 pb-2">
                                                <div data-mdb-input-init class="form-outline">
                                                    <input type="password" id="form3Examplev4" name="password" placeholder="Password" style="border: hidden" />
                                                </div>
                                            </div>

                                        </div>
                                    </div>
                                    <div class="col-lg-6 bg-indigo text-white">
                                        <div class="p-5">
                                            <h3 class="fw-normal mb-5">Contact Details</h3>

                                            <div class="mb-4 pb-2">
                                                <div data-mdb-input-init class="form-outline form-white">
                                                    <input type="text" id="form3Examplea2" placeholder="Street + Nr" style="border: hidden" />
                                                </div>
                                            </div>

                                            <div class="row">
                                                <div class="col-md-5 mb-4 pb-2">

                                                    <div data-mdb-input-init class="form-outline form-white">
                                                        <input type="text" id="form3Examplea4" placeholder="Zip Code" style="border: hidden" />
                                                    </div>

                                                </div>
                                                <div class="col-md-7 mb-4 pb-2">

                                                    <div data-mdb-input-init class="form-outline form-white">
                                                        <input type="text" id="form3Examplea5" name="county" placeholder="County" style="border: hidden; padding-left: 10px;" />
                                                    </div>

                                                </div>
                                            </div>

                                            <div class="mb-4 pb-2">
                                                <div data-mdb-input-init class="form-outline form-white">
                                                    <label>Phone Number</label>
                                                    <br />
                                                    <input type="tel" pattern="[0]{1}[7-9]{1}[0-9]{9}" name="phonenumber" placeholder="07700900123" style="border: hidden" />
                                                </div>
                                            </div>



                                            <div class="form-check d-flex justify-content-start mb-4 pb-3">
                                                <input class="form-check-input me-3" required type="checkbox" value="" id="form2Example3c" />
                                                <label class="form-check-label text-white" for="form2Example3">
                                                    I do accept the <a href="#!" class="text-white"><u>Terms and Conditions</u></a> of your
                                                    site.
                                                </label>
                                            </div>

                                            <button type="submit" data-mdb-button-init data-mdb-ripple-init class="btn btn-light btn-lg"
                                                    data-mdb-ripple-color="dark">
                                                Register
                                            </button>
                                            <p>Already have an account? <a href="/login">Login</a></p>
                                            {% with messages = get_flashed_messages() %}
                                                {% if messages %}
                                                    <ul>{% for msg in messages %}<li>{{ msg }}</li>{% endfor %}</ul>
                                                {% endif %}
                                            {% endwith %}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        <script type="text/javascript" src="https://cdnjs.cloudflare.com"></script>
    </form>


</body>
